name: Gerar SolarPropV.exe

on:
  push:
    branches: [main, master]
  workflow_dispatch: # permite rodar manualmente pela interface do GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar aplicação
        run: npm run build

      - name: Gerar .exe portátil para Windows x64
        run: npx electron-builder --win portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mostrar arquivo gerado
        run: dir release\

      - name: 📦 Disponibilizar .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: SolarPropV-${{ github.run_number }}-Windows
          path: release/*.exe
          retention-days: 90

  # Job separado: gera um Release oficial quando você criar uma tag (ex: v1.0.0)
  release:
    needs: build-windows
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Criar Release oficial no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: SolarPropV ${{ github.ref_name }}
          body: |
            ## SolarPropV ${{ github.ref_name }}

            ### Download
            Baixe o arquivo `.exe` abaixo e execute diretamente — sem instalação.

            ### O que há nessa versão
            - Dimensionamento fotovoltaico (consumo → kWp → kit)
            - Cálculo de perdas por especificações do kit (NOCT, coef. temperatura, bifacial)
            - Custos mensais recorrentes: taxa de disponibilidade + CIP + Fio B (Lei 14.300/2022)
            - Precificação completa com impostos (Simples Nacional) e margem
            - Geração de proposta comercial em PDF com logo da empresa
          files: release/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
